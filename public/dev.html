<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Team Hub · BCrew AI OS</title>
    <link rel="stylesheet" href="/dev.css?v=20260522b" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="dev-page">
      <header class="dev-topbar">
        <a class="dev-brand" href="/" aria-label="All hubs">
          <span class="dev-logo"><img src="/assets/bc-logo.svg" alt="" /></span>
          <span>
            <span class="dev-brand-name">BCrew AI OS</span>
            <span class="dev-brand-mode">Dev Team Hub</span>
          </span>
        </a>
        <div class="dev-topbar-right">
          <span class="dev-live" id="dev-sync-status"><span></span>Read only</span>
          <a class="dev-toplink" href="/">All hubs</a>
        </div>
      </header>

      <div class="dev-shell">
        <aside class="dev-sidebar">
          <a class="dev-back" href="/">← All hubs</a>
          <div class="dev-side-head">
            <span>Hub</span>
            <strong>Dev / Build</strong>
          </div>
          <nav class="dev-nav" aria-label="Dev Team Hub views">
            <button class="dev-nav-item is-active" type="button" data-view="overview">Overview</button>
            <button class="dev-nav-item" type="button" data-view="sprint">Sprint</button>
            <button class="dev-nav-item" type="button" data-view="backlog">Backlog</button>
            <button class="dev-nav-item" type="button" data-view="intel">Intel</button>
            <button class="dev-nav-item" type="button" data-view="opportunities">Opportunities</button>
            <button class="dev-nav-item" type="button" data-view="approvals">Approvals</button>
            <button class="dev-nav-item" type="button" data-view="recent">Recent</button>
          </nav>
        </aside>

        <main class="dev-main">
          <section class="dev-page-head">
            <div>
              <p class="dev-eyebrow">DEV TEAM HUB</p>
              <h1 id="dev-view-title">Overview</h1>
              <p class="dev-subtitle" id="dev-view-subtitle">Current active work, approval needs, Build Intel, and recent proof from Foundation truth.</p>
            </div>
            <div class="dev-head-actions" aria-label="Dev Hub status">
              <span class="dev-source-pill">read only</span>
              <span class="dev-source-pill">proposal gated</span>
            </div>
          </section>

          <div id="dev-status" class="dev-status" role="status">Loading Foundation truth.</div>
          <section class="dev-view-root" id="dev-view-root" aria-live="polite"></section>

          <div class="dev-proof-landmarks" hidden>
            <span id="source-status"></span>
            <span id="research-pool"></span>
            <span id="scout-report"></span>
            <span id="ranked-opportunities"></span>
            <span id="atoms-evidence"></span>
            <span id="approval-links"></span>
          </div>
        </main>
      </div>
    </div>
    <script src="/dev.js?v=20260522b"></script>
  </body>
</html>
